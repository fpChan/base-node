version: '3.8'

services:
  geth: # this is Optimism's geth client
    build: .
    ports:
      - 22301:8545       # RPC
      - 22302:8546       # websocket
      - 22303:30303     # P2P TCP (currently unused)
      - 22303:30303/udp # P2P UDP (currently unused)
      - 22304:6060       # metrics
    command: [ "bash", "./geth-entrypoint" ]
    volumes:
        - ${GETH_HOST_DATA_DIR}:/data
    env_file:
      # select your network here:
#      - .env.sepolia
      - .env.mainnet
  node:
    build: .
    depends_on:
      - geth
    ports:
      - 22305:8545     # RPC
      - 22306:9222     # P2P TCP
      - 22306:9222/udp # P2P UDP
      - 22307:7300     # metrics
      - 22308:6060     # pprof
    command: [ "bash", "./op-node-entrypoint" ]
    env_file:
      # select your network here:
#      - .env.sepolia
      - .env.mainnet
